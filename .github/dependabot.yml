# GitHub Dependabot 설정 파일
# 이 파일이 있으면 GitHub가 자동으로 의존성 보안 업데이트를 PR로 올려줍니다.

version: 2

updates:
  # npm 패키지 의존성 자동 업데이트
  - package-ecosystem: "npm"
    # 프로젝트 루트에서 package.json을 찾습니다.
    directory: "/"
    schedule:
      # 매주 월요일 오전 9시(KST 기준)에 확인합니다.
      interval: "weekly"
      day: "monday"
      time: "00:00"
      timezone: "Asia/Seoul"
    # 한 번에 열리는 PR 수를 제한해 알림 과부하를 막습니다.
    open-pull-requests-limit: 5
    # PR 제목 앞에 붙을 접두어 (알아보기 쉽게)
    commit-message:
      prefix: "chore(deps)"
    # 관련 패키지를 묶어서 PR 하나로 만들어요
    # → eslint + @eslint/js 가 따로 올라오면 버전 충돌이 생기는 걸 방지해요
    groups:
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "globals"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      framer-motion:
        patterns:
          - "framer-motion"
          - "motion-*"
